general:
    patch_author: The Managarm Project
    patch_email: info@managarm.org
    everything_by_default: false
    mandate_hashes_for_archives: true
    enable_network_isolation: true
    cargo:
        config_toml: 'extrafiles/config.toml'

# NOTE: There are two special build IDs:
# - "latest" refers to the newest build on xbbs, whether or not it succeeded
# - "success" referes to the newest build on xbbs *that did succeed*
# We're using "success" as that guarantees that the build from which we pull
# packages can boot, since all build attempts have a test-image step that must
# run.
repositories:
    tool_archives:
        x86_64: 'https://builds.managarm.org/projects/managarm/success/repo/tools/x86_64/'
        aarch64: 'https://builds.managarm.org/projects/managarm_aarch64/success/repo/tools/aarch64/'
        riscv64: 'https://builds.managarm.org/projects/managarm_riscv64/success/repo/tools/riscv64/'
    xbps:
        x86_64: 'https://builds.managarm.org/projects/managarm/success/repo/packages/x86_64/'
        aarch64: 'https://builds.managarm.org/projects/managarm_aarch64/success/repo/packages/aarch64/'
        riscv64: 'https://builds.managarm.org/projects/managarm_riscv64/success/repo/packages/riscv64/'

# TODO: We currently don't support computed options or anything of that sort,
#       so we just define the architecture, and the triple as 2 options
#       (some packages, like llvm and libjpeg-turbo need the architecture)
declare_options:
  - name: arch
    default: x86_64
  - name: arch-triple
    default: x86_64-managarm
  - name: mount-using
    default: guestfs
  - name: image-size
    default: 4G
  - name: rust-arch
    default: x86_64

container:
    suite: trixie
    snapshot: 20260316T143826Z
    base_packages:
    # Used by lwjgl2
    - ant
    # Used by gnutls
    - autogen
    # Used by host-bison
    - autopoint
    # Used by the Linux kernel
    - bc
    # Used by binutils in the build process
    - bison
    # Contains gcc and g++
    - build-essential
    # Used by several packages
    - cmake
    # Used during image generation
    - cpio
    # Used by protobuf
    - curl
    # Used by image_create.sh
    - e2fsprogs
    # Used by binutils in the build process
    - flex
    # Required by flex but not a hard dependency in Debian.
    - libfl2
    # Used by many tools in the build process
    - gawk
    # Used by libidn2
    - gengetopt
    # Used by host-gettext
    - gettext
    # Used by mesa if vulkan is enabled
    - glslang-tools
    # Git is used extensively in the build process
    - git
    # Used by eudev
    - gperf
    # Used by libiconv
    - groff
    # Used by libtool
    - help2man
    # Used by libdisplay-info
    - hwdata
    # Used by libqalculate
    - intltool
    # Used by shared-mime-info
    - itstool
    # Used by host-karchive
    - libbz2-dev
    - liblzma-dev
    - libzstd-dev
    # Used by host-knotifications
    - libcanberra-dev
    # Used for systemd
    - udev
    # Used by host-appstream
    - libcurl4-openssl-dev
    # Used by newer versions of the Qt6 superbuild
    - libegl-dev
    # Used by the Linux kernel
    - libelf-dev
    # Used by wayland-scanner
    - libexpat1-dev
    # Used by gtk+-2
    - libgdk-pixbuf2.0-bin
    # Used by various gobject tools
    - libgirepository1.0-dev
    # Used by gdk-pixbuf
    - libglib2.0-dev-bin
    # Used by vala
    - libglib2.0-dev
    # Used by gtksourceview5
    - libgtk-4-bin
    # Used by host-qt6
    - libgl-dev
    # Used by GTK4
    - libgtk-4-bin
    # GMP, MPFR and MPC are used by gcc
    - libgmp-dev
    - libmpc-dev
    - libmpfr-dev
    # Used by host-sonnet
    - libhunspell-dev
    # Used by host-kio
    - libmount-dev
    # Used by cmake
    - libssl-dev
    # Used by ace
    - libpng-dev
    # Used by host-solid
    - libudev-dev
    # Used by host-qt6
    - libwayland-dev
    - libx11-xcb-dev
    - libxkbcommon-x11-dev
    # Used by host-kwindowsystem
    - libxfixes-dev
    # Used by host-appstream
    - libxml2-dev
    - libyaml-dev
    # Used by many gnu build steps
    - m4
    # Used by Managarm all over the place.
    - meson
    # Required to build images for Android's fastboot protocol.
    - mkbootimg
    # Used by limine
    - mtools
    # Used by libjpeg-turbo for performance reasons
    - nasm
    # Used by groff
    - netpbm
    # Used by Managarm
    - ninja-build
    # To build the certificates, we need trust, provided by p11-kit
    - p11-kit
    # Used by scripts/run-wrapper
    - patchelf
    # Various build systems invoke pkg-config
    - pkg-config
    # Used by host-kguiaddons
    - plasma-wayland-protocols
    # Used by various gobject tools
    - python3-gi
    # Used by libei
    - python3-jinja2
    # Used by itstool
    - python3-libxml2
    # Used by breeze-icons
    - python3-lxml
    # Used by mesa
    - python3-mako
    # We need pip, setuptools and wheel for installing python packages
    - python3-pip
    - python3-setuptools
    - python3-wheel
    # Used by host-glib
    - python3-packaging
    # Used by libxcb
    - python3-xcbgen
    # Several programs use rsync
    - rsync
    # Used by webkitgtk
    - ruby
    # Used by GTK4
    - sassc
    # makeinfo is used in gnu build systems
    - texinfo
    # Provides 'mkimage', required to build Allwinner D1 images.
    - u-boot-tools
    # Used by webkitgtk
    - unifdef
    # Used by protobuf
    - unzip
    # Used by host-kwindowsystem
    - wayland-protocols
    # We use wget to fetch some stuff further down
    - wget
    # Used by xcursor-themes
    - x11-apps
    # Used by mutter
    - xcvt
    # Used by eudev
    - xsltproc
    # Used by various programs, for example, it is used by file
    - zlib1g-dev
    # Used by the developers
    - clangd
    # used to generate images
    - fdisk
    - dosfstools
    - mtools
    # Used by host-qt6 to enable the X11 backend
    - libxcb-xinerama0-dev
    - libxcb-screensaver0-dev
    - libxcb-composite0-dev
    - libxcb-image0-dev
    - libxcb-record0-dev
    - libxcb-randr0-dev
    - libxcb-present-dev
    - libxcb-damage0-dev
    - libxcb-cursor-dev
    - libxcb-dri3-dev
    - libxcb-dri2-0-dev
    - libxcb-glx0-dev
    - libxcb-xinput-dev
    - libxcb-res0-dev
    - libxcb-xf86dri0-dev
    - libxcb-dpms0-dev
    - libxcb-ewmh-dev
    - libxcb-util0-dev
    - libxcb-keysyms1-dev
    - libxcb-icccm4-dev

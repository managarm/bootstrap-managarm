packages:
  - name: libqalculate
    architecture: '@OPTION:arch@'
    metadata:
      summary: A modern multi-purpose calculator library
      description: This package contains a modern multi-purpose calculator library.
      spdx: 'GPL-2.0-or-later'
      website: 'https://qalculate.github.io/'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['sci-libs']
    source:
      subdir: 'ports'
      git: 'https://github.com/Qalculate/libqalculate.git'
      tag: 'v5.10.0'
      version: '5.10.0'
      tools_required:
        - host-autoconf-v2.69
        - host-automake-v1.15
        - host-libtool
        - host-pkg-config
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - system-gcc
    pkgs_required:
      - mlibc
      - curl
      - gmp
      - icu
      - libiconv
      - libxml
      - mpfr
      - readline
    revision: 1
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--with-sysroot=@SYSROOT_DIR@' # Set libtool's lt_sysroot.
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

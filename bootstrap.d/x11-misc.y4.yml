sources:
  - name: 'xorg-util-macros'
    subdir: ports
    git: 'https://gitlab.freedesktop.org/xorg/util/macros.git'
    tag: 'util-macros-1.20.2'
    version: '1.20.2'
    tools_required:
      - host-autoconf-v2.69
      - host-automake-v1.11
      - host-libtool
      - host-pkg-config
    regenerate:
      - args: ['./autogen.sh']
        environ:
          'NOCONFIGURE': 'yes'

tools:
  - name: host-xorg-macros
    labels: [aarch64, riscv64]
    architecture: noarch
    exports_aclocal: true
    from_source: xorg-util-macros
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--prefix=@PREFIX@'
    compile:
      - args: ['make', '-j@PARALLELISM@']
    install:
      - args: ['make', 'install']

packages:
  - name: sddm
    architecture: '@OPTION:arch@'
    metadata:
      summary: Simple Desktop Display Manager
      description: This package provides SDDM, a simple display manager.
      spdx: 'GPL-2.0-or-later'
      website: 'https://github.com/sddm/sddm'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['x11-misc']
    source:
      subdir: 'ports'
      git: 'https://github.com/sddm/sddm.git'
      tag: 'v0.21.0'
      version: '0.21.0'
    tools_required:
      - system-gcc
      - host-cmake
      - host-qt6
    pkgs_required:
      - mlibc
      - qtbase6
      - qtdeclarative6
    revision: 1
    configure:
      - args:
        - 'cmake'
        - '-GNinja'
        - '-DCMAKE_INSTALL_PREFIX=/usr'
        - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/scripts/CMakeToolchain-@OPTION:arch-triple@.txt'
        - '-DCMAKE_BUILD_TYPE=RelWithDebInfo'
        - '-DBUILD_MAN_PAGES=OFF'
        - '-DBUILD_WITH_QT6=ON'
        - '-DDBUS_CONFIG_FILENAME="org.freedesktop.sddm.conf"'
        - '-DRUNTIME_DIR=/run/sddm'
        - '-DSYSTEMD_TMPFILES_DIR=/usr/lib/tmpfiles.d'
        - '-DSYSTEMD_SYSTEM_UNIT_DIR=/usr/lib/systemd/system'
        - '-DSYSTEMD_SYSUSERS_DIR=/usr/lib/sysusers.d'
        - '-DNO_SYSTEMD=OFF'
        - '-DUSE_ELOGIND=OFF'
        - '-DCMAKE_POLICY_VERSION_MINIMUM=3.5'
        - '-DENV_QT_IMPORTS_DIR=/usr/lib/qt6/qml'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
      - args: ['mkdir', '-p', '@THIS_COLLECT_DIR@/usr/lib/systemd/system/sddm.target.wants']
      # - args: ['mkdir', '-p', '@THIS_COLLECT_DIR@/usr/lib/systemd/system/graphical.target.wants']
      - args: ['ln', '-svn', '../sddm.service', '@THIS_COLLECT_DIR@/usr/lib/systemd/system/sddm.target.wants/']
      # - args: ['ln', '-svn', '../sddm.service', '@THIS_COLLECT_DIR@/usr/lib/systemd/system/graphical.target.wants/']
      - args: ['cp', '@THIS_SOURCE_DIR@/sddm.target', '@THIS_COLLECT_DIR@/usr/lib/systemd/system/sddm.target']
      - args: ['cp', '@SOURCE_ROOT@/extrafiles/pam.d/sddm', '@THIS_COLLECT_DIR@/etc/pam.d/']
      - args: ['cp', '@SOURCE_ROOT@/extrafiles/pam.d/sddm-autologin', '@THIS_COLLECT_DIR@/etc/pam.d/']
      - args: ['cp', '@SOURCE_ROOT@/extrafiles/pam.d/sddm-greeter', '@THIS_COLLECT_DIR@/etc/pam.d/']
      - args: ['cp', '@SOURCE_ROOT@/extrafiles/sddm.conf', '@THIS_COLLECT_DIR@/etc/']

  # TODO: why is this so old?
  - name: shared-mime-info
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xdg/shared-mime-info.git'
      tag: 'Release-1-15'
      version: '1.15'
      tools_required:
        - host-autoconf-v2.69
        - host-automake-v1.11
        - host-libtool
        - host-pkg-config
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - system-gcc
      - host-python
    pkgs_required:
      - mlibc
      - glib
      - libxml
      - itstool
    revision: 14
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--disable-update-mimedb'
        environ:
          'ITSTOOL': '/usr/bin/itstool'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
    scripts:
        post_install:
          - args: 'echo "Running update-mime-database; this may take a minute or 2..."'
          - args: '/usr/bin/update-mime-database /usr/share/mime/'

  - name: xbitmaps
    architecture: '@OPTION:arch@'
    source:
      subdir: ports
      git: 'https://gitlab.freedesktop.org/xorg/data/bitmaps.git'
      tag: 'xbitmaps-1.1.3'
      version: '1.1.3'
      tools_required:
        - host-autoconf-v2.69
        - host-automake-v1.11
        - host-libtool
        - host-pkg-config
        - host-xorg-macros
      regenerate:
        - args: ['./autogen.sh']
          environ:
            'NOCONFIGURE': 'yes'
    tools_required:
      - system-gcc
    pkgs_required:
      - mlibc
      - xorg-util-macros
    revision: 9
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: xkeyboard-config
    labels: [aarch64, riscv64]
    architecture: '@OPTION:arch@'
    source:
      subdir: 'ports'
      git: 'https://gitlab.freedesktop.org/xkeyboard-config/xkeyboard-config.git'
      tag: 'xkeyboard-config-2.43'
      version: '2.43'
    tools_required:
      - host-xorg-macros
      - system-gcc
    pkgs_required:
      - mlibc
      - libx11
      - xorg-proto
    revision: 3
    configure:
      - args:
        - 'meson'
        - 'setup'
        - '--cross-file'
        - '@SOURCE_ROOT@/scripts/meson-@OPTION:arch-triple@.cross-file'
        - '--prefix=/usr'
        - '--buildtype=release'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

  - name: xorg-util-macros
    labels: [aarch64, riscv64]
    architecture: '@OPTION:arch@'
    from_source: xorg-util-macros
    tools_required:
      - system-gcc
      - host-xorg-macros
    revision: 3
    configure:
      - args:
        - '@THIS_SOURCE_DIR@/configure'
        - '--host=@OPTION:arch-triple@'
        - '--prefix=/usr'
        - '--sysconfdir=/etc'
        - '--localstatedir=/var'
        - '--disable-static'
    build:
      - args: ['make', '-j@PARALLELISM@']
      - args: ['make', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'

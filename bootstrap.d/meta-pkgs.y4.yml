!<tag:y4.managarm.org:preamble>
import:
  - !managarm
---
packages:
  # Meta package with the bare minimum to boot kmscon and be useful
  - name: base
    labels: [aarch64, riscv64]
    architecture: noarch
    metadata:
      summary: Minimum meta-package to provide a useful environment
      description: This meta-package provides a useful terminal only environment with various common unix tools and the xbps package manager.
      spdx: 'MIT'
      website: 'https://managarm.org'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['meta-pkgs']
    source:
      subdir: meta-sources
      version: '1.0'
    pkgs_required:
      - mlibc
      - bash
      - bzip2
      - ca-certificates
      - core-files
      - coreutils
      - dbus
      - dhcpcd
      - diffutils
      - findutils
      - gawk
      - grep
      - gzip
      - htop
      - iana-etc
      - iproute2
      - kmscon
      - less
      - libgcc
      - libstdc++
      - libxcrypt
      - locale-data
      - man-db
      - man-pages-posix
      - managarm-kernel
      - managarm-kernel-uefi
      - managarm-system
      - managarm-system-rs
      - nano
      - pciutils
      - procps
      - sed
      - shadow
      - systemd
      - tar
      - tzdata
      - usbutils
      - util-linux
      - vim
      - wget
      - which
      - xbps
      - xkeyboard-config
      - xz-utils
    revision: 13
    configure: []
    build: []

  # Meta package with build essentials
  - name: base-devel
    architecture: noarch
    source:
      subdir: meta-sources
      version: '1.0'
    metadata:
      summary: Meta-package to provide common development utilities
      description: This meta-package provides a set of commonly used development utilities, including the gcc compiler and GNU Make.
      spdx: 'MIT'
      website: 'https://managarm.org'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['meta-pkgs']
    pkgs_required:
      - base
      - bc
      - binutils
      - cmake
      - gcc
      - m4
      - make
      - man-pages-posix
      - nasm
      - patch
      - pkg-config
    revision: 3
    configure: []
    build: []

  # Meta package for weston and usefull utilities
  - name: weston-desktop
    labels: [aarch64, riscv64]
    architecture: noarch
    source:
      subdir: meta-sources
      version: '1.0'
    metadata:
      summary: Meta-package to provide a useful GUI environment (Weston)
      description: This meta-package provides a GUI environment based on the Weston compositor and various small X based utilities.
      spdx: 'MIT'
      website: 'https://managarm.org'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['meta-pkgs']
    pkgs_required:
      - base
      - sddm
      - weston
      - xclock
      - xdpyinfo
      - xdriinfo
      - xkill
      - xlsclients
      - xwininfo
    revision: 3
    configure: []
    build: []

        - '-DKDE_INSTALL_QMLDIR=/usr/lib/qt6/qml'
        - '-DKDE_INSTALL_PLUGINDIR=/usr/lib/qt6/plugins'
        - '-DKDE_INSTALL_QTPLUGINDIR=/usr/lib/qt6/plugins'
        ### end ecm.class
        - '-DKF6_HOST_TOOLING=@BUILD_ROOT@/tools/host-kconfig/lib/x86_64-linux-gnu/cmake/'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']

packages:
  - name: kcalc
    architecture: '@OPTION:arch@'
    metadata:
      summary: KDE calculator
      description: This package provides a calculator offering everything a scientific calculator does, and more.
      spdx: 'GPL-2.0-only'
      website: 'https://apps.kde.org/kcalc/'
      maintainer: "Dennis Bonke <dennis@managarm.org>"
      categories: ['kde-apps']
    source:
      subdir: 'ports'
      git: 'https://github.com/KDE/kcalc.git'
      tag: 'v24.12.2'
      version: '24.12.2'
    tools_required:
      - system-gcc
      - host-cmake
      - host-qt6
      - host-ecm
      - host-kconfig
      - host-pkg-config
    pkgs_required:
      - mlibc
      - gmp
      - kconfig
      - kconfigwidgets
      - kcoreaddons
      - kcrash
      - kguiaddons
      - ki18n
      - knotifications
      - kwidgetsaddons
      - kxmlgui
      - mpfr
      - qt5compat
      - qtbase6
    revision: 5
    configure:
      - args:
        - 'cmake'
        - '-GNinja'
        - '-DCMAKE_INSTALL_PREFIX=/usr'
        - '-DCMAKE_TOOLCHAIN_FILE=@SOURCE_ROOT@/scripts/CMakeToolchain-@OPTION:arch-triple@.txt'
        - '-DECM_DIR=@BUILD_ROOT@/tools/host-ecm'
        - '-DCMAKE_BUILD_TYPE=RelWithDebInfo'
        ### from ecm.class
        - '-DQT_MAJOR_VERSION=6'
        - '-DBUILD_TESTING=OFF'
        - '-DBUILD_QCH=FALSE'
        - '-DKDE_INSTALL_USE_QT_SYS_PATHS=ON'
        - '-DKDE_INSTALL_QMLDIR=/usr/lib/qt6/qml'
        - '-DKDE_INSTALL_PLUGINDIR=/usr/lib/qt6/plugins'
        - '-DKDE_INSTALL_QTPLUGINDIR=/usr/lib/qt6/plugins'
        ### end ecm.class
        - '-DKF6_HOST_TOOLING=@BUILD_ROOT@/tools/host-kconfig/lib/x86_64-linux-gnu/cmake/'
        - '@THIS_SOURCE_DIR@'
    build:
      - args: ['ninja']
      - args: ['ninja', 'install']
        environ:
          DESTDIR: '@THIS_COLLECT_DIR@'
      - args: ['@SOURCE_ROOT@/scripts/split-debug.py', '--binutils', '@THIS_COLLECT_DIR@']
    subpackages:
      - name: kcalc-dbg
        include: ['/usr/lib/debug/**']

  - name: konsole
